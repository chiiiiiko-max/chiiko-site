<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信ありがとうございました | chiiko illust</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Zen+Maru+Gothic:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --kinari: #F5F0E8;
    --pink: #D7A9AE;
    --charcoal: #4B4845;
    --text-soft: #6B6662;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 300;
    background: var(--kinari); color: var(--charcoal);
    line-height: 1.9; letter-spacing: 0.06em;
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
    text-align: center; padding: 24px;
  }
  .en { font-family: 'Cormorant Garamond', serif; letter-spacing: 0.22em; }
  h1 { font-size: 1.6rem; font-weight: 300; margin-bottom: 18px; }
  p { font-size: 0.9rem; margin-bottom: 28px; }
  a {
    display: inline-block; padding: 13px 36px; border-radius: 999px;
    background: var(--pink); color: #fff; text-decoration: none; font-size: 0.88rem;
  }
  .bubble { font-size: 1.4rem; margin-bottom: 14px; }
</style>
</head>
<body>
<div>
  <div class="bubble">🫧</div>
  <h1 class="en">Thank You</h1>
  <p>ご相談を送信しました。<br>2〜3日以内にメールでお返事いたします。</p>
